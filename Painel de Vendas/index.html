<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <title>Vendas | RuaRoma Dia de Pista</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- Usando builds compat para expor o namespace global `firebase` -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <style>
        :root{
            --brand-red:#E63A2E;
            --brand-green:#197a3b;
            --bg-left:#071e26;
            --bg-right:#0f3a45;
            --card-bg: rgba(0,0,0,0.6);
            --muted:#cfdde6;
            --text:#ffffff;
            --accent:#2ea3ff;
        }
        html,body{height:100%;margin:0;}
        body{
            display:flex;
            align-items:center;
            justify-content:center;
            padding:32px;
            background-image: linear-gradient(90deg,var(--bg-left),var(--bg-right));
            font-family: "Inter", Arial, Helvetica, sans-serif;
            -webkit-font-smoothing:antialiased;
        }
        .box{
            width:360px;
            max-width:calc(100% - 48px);
            background:var(--card-bg);
            border-radius:15px;
            padding:18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.6);
            color:var(--text);
        }
        .brand{ display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
        .brand img{ max-width:220px; height:auto; display:block; }
        #brand-text{ display:none; font-family:"Pacifico",cursive; color:var(--brand-red); font-size:20px; }
        h2{ text-align:center; margin:0 0 8px 0; }
        .categorias { display:flex; gap:12px; justify-content:center; margin-bottom:12px; }
        .categoria-btn{
            border: none;
            color: #fff;
            padding:12px;
            border-radius:8px;
            width:140px;
            height:86px;
            cursor:pointer;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            gap:6px;
            background: linear-gradient(180deg, var(--brand-red), #b83228);
        }
        .categoria-icone { font-size:34px; }
        form fieldset{ border:2px solid rgba(46,163,255,0.35); padding:12px; border-radius:8px; }
        legend{ background: var(--brand-red); padding:6px 10px; border-radius:6px; color:#fff; font-family:"Pacifico",cursive; }
        .pedido-item{ display:flex; align-items:center; gap:8px; margin:8px 0; }
        .pedido-item label{ flex:1; color: #e6eef6; }
        .qtd-input{ width:60px; padding:6px; border-radius:6px; border:1px solid rgba(46,163,255,0.18); background:transparent; color:white; }
        .inputBox{ margin-top:8px; }
        .labelInput.staticLabel{ display:block; margin-bottom:6px; color:var(--muted); font-size:13px; }
        .valor-input{ width:100%; padding:8px 10px; border-radius:6px; border:1px solid rgba(46,163,255,0.14); background: rgba(0,0,0,0.15); color:#fff; font-size:18px; text-align:right; box-sizing:border-box; }
        .voltar-btn{ background:var(--brand-green); color:#fff; border:none; padding:10px 12px; border-radius:6px; cursor:pointer; }
        #submit-btn{ background-image: linear-gradient(90deg, var(--brand-red), #8f2b24); width:100%; border:none; padding:12px; color:white; font-size:16px; cursor:pointer; border-radius:8px; }
        .actions{ display:flex; gap:8px; margin-top:10px; align-items:center; }
        p.section-title{ margin:10px 0 6px 0; color:#dbeefc; }
    </style>
</head>
<body>
    <div class="box">
        <div class="brand">
            <img src="assets/logo.png" alt="RuaRoma Logo"
                 onerror="this.style.display='none'; document.getElementById('brand-text').style.display='inline-block'">
            <span id="brand-text">Vendas RuaRoma Dia de Pista</span>
        </div>

        <div style="text-align:center; margin-bottom:12px;">
            <button id="open-painel-btn" style="background:#333; color:#fff; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px;" onclick="abrirPainelVendas()">📋 Ver Vendas</button>
            <button style="background:#553388; color:#fff; border:none; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:14px; margin-left:8px;" onclick="window.location.href='relatorio.html'">📊 Painel Relatórios</button>
        </div>

        <div id="painel-vendas" style="display:none; margin-bottom:12px; background: rgba(255,255,255,0.04); padding:10px; border-radius:8px;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                <strong>Painel de Vendas (últimas 200)</strong>
                <div>
                    <button style="background:#197a3b; color:#fff; border:none; padding:6px 8px; border-radius:6px; cursor:pointer; margin-right:6px;" onclick="carregarVendas()">Atualizar</button>
                    <button style="background:#b33; color:#fff; border:none; padding:6px 8px; border-radius:6px; cursor:pointer;" onclick="fecharPainelVendas()">Fechar</button>
                </div>
            </div>
            <div id="vendas-list" style="max-height:none; overflow:visible; font-size:13px; color:#e6eef6;"></div>
        </div>

        <div id="tela-categorias">
            <h2>Escolha uma Categoria</h2>
            <div class="categorias">
                <button class="categoria-btn" type="button" onclick="mostrarCategoria('pizzas')">
                    <span class="categoria-icone">🍕</span>
                    <span>Pizzas</span>
                </button>
                <button class="categoria-btn" type="button" onclick="mostrarCategoria('bebidas')">
                    <span class="categoria-icone">🍸</span>
                    <span>Bebidas</span>
                </button>
            </div>
        </div>

        <form id="formulario-pedido" style="display:none;">
            <fieldset>
                <legend>Vendas RuaRoma Dia de Pista</legend>

                <p class="section-title">Pedidos (selecione os itens desejados):</p>

                <!-- Pizzas -->
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="mussarela" name="item_pedido" value="mussarela">
                    <label for="mussarela">Mussarela - R$25,00</label>
                    <input type="number" id="qtd_mussarela" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="calabresa" name="item_pedido" value="calabresa">
                    <label for="calabresa">Calabresa - R$25,00</label>
                    <input type="number" id="qtd_calabresa" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="pepperoni" name="item_pedido" value="pepperoni">
                    <label for="pepperoni">Pepperoni - R$25,00</label>
                    <input type="number" id="qtd_pepperoni" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="ragu_linguica" name="item_pedido" value="ragu_linguica">
                    <label for="ragu_linguica">Ragú - R$25,00</label>
                    <input type="number" id="qtd_ragu_linguica" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="pannacotta" name="item_pedido" value="pannacotta">
                    <label for="pannacotta">Pannacotta - R$25,00</label>
                    <input type="number" id="qtd_pannacotta" class="qtd-input" value="0" min="0" max="99">
                </div>

                    <input type="checkbox" id="terrinha" name="item_pedido" value="terrinha">
                    <label for="terrinha">Terrinha - R$25,00</label>
                    <input type="number" id="qtd_terrinha" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="ossobuco" name="item_pedido" value="ossobuco">
                    <label for="ossobuco">Ossobuco - R$25,00</label>
                    <input type="number" id="qtd_ossobuco" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-pizza">
                    <input type="checkbox" id="sensacao" name="item_pedido" value="sensacao">
                    <label for="sensacao">Sensação - R$25,00</label>
                    <input type="number" id="qtd_sensacao" class="qtd-input" value="0" min="0" max="99">
                </div>

                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="caipirinha" name="item_pedido" value="caipirinha">

                    <input type="number" id="qtd_caipirinha" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="mojito" name="item_pedido" value="mojito">

                    <input type="number" id="qtd_mojito" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="ginpesto" name="item_pedido" value="ginpesto">
                    <label for="ginpesto">GinPesto - R$28,00</label>
                    <input type="number" id="qtd_ginpesto" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="refrigerante" name="item_pedido" value="refrigerante">
                    <label for="refrigerante">Refrigerante - R$8,00</label>
                    <input type="number" id="qtd_refrigerante" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="agua" name="item_pedido" value="agua">

                    <input type="number" id="qtd_chopp300" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="chopp500" name="item_pedido" value="chopp500">
                    <label for="chopp500">Chopp 500ml - R$18,00</label>
                    <input type="number" id="qtd_chopp500" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="chopp300promo" name="item_pedido" value="chopp300promo">
                    <label for="chopp300promo">Chopp Prom 300ml - R$10,00</label>
                    <input type="number" id="qtd_chopp300promo" class="qtd-input" value="0" min="0" max="99">
                </div>
                <div class="pedido-item item-bebida">
                    <input type="checkbox" id="chopp500promo" name="item_pedido" value="chopp500promo">
                    <label for="chopp500promo">Chopp Prom 500ml - R$16,00</label>
                    <input type="number" id="qtd_chopp500promo" class="qtd-input" value="0" min="0" max="99">

                <div class="inputBox" style="margin-top:10px;">

                <div class="inputBox" style="margin-top:8px;">

                <div class="actions">

    <script>
    // ========== CONFIGURAÇÃO DO FIREBASE ==========
    // Valores fornecidos pelo usuário (copie/cole exatamente se desejar usar o snippet do Firebase)
    const firebaseConfig = {
        apiKey: "AIzaSyChQu85D9AYXZkzCSGGr0xsHw-ltWLmaVk",
        authDomain: "painel-de-vendas-4eb5f.firebaseapp.com",
        projectId: "painel-de-vendas-4eb5f",
        storageBucket: "painel-de-vendas-4eb5f.firebasestorage.app",
        messagingSenderId: "526943575513",
        appId: "1:526943575513:web:807c47677f6f9d54074dc8",
        measurementId: "G-E27B940ME8",
        // URL do Realtime Database fornecida pelo usuário
        databaseURL: "https://painel-de-vendas-4eb5f-default-rtdb.firebaseio.com/"
    };

    // Inicializa Firebase
    try {
        firebase.initializeApp(firebaseConfig);
        window.firebaseDb = firebase.database();
        console.log('✓ Firebase inicializado com sucesso');
    } catch (e) {
        console.warn('⚠ Firebase não configurado. Verifique as credenciais em firebaseConfig', e);
        alert('⚠ Firebase não configurado: ' + (e && e.message ? e.message : e));
        window.firebaseDb = null;
    }

    // Função para salvar venda no Firebase
    async function salvarVendaNoFirebase(dados) {
        if (!window.firebaseDb) {
            console.warn('Firebase não disponível - verifique se a inicialização foi feita e se o site está sendo servido via http/https.');
            alert('⚠ Firebase não disponível. Verifique `databaseURL` em firebaseConfig, se o site está servido via http/https e as regras do Realtime Database.');
            return false;
        }
        try {
            const timestamp = new Date().getTime();
            const ref = window.firebaseDb.ref('vendas/' + timestamp);
            await ref.set(dados);
            console.log('✓ Venda salva no Firebase:', dados);
            return true;
        } catch (err) {
            console.error('Erro ao salvar no Firebase:', err);
            // Mostra detalhes do erro para facilitar debug
            try { alert('✗ Erro ao salvar no Firebase: ' + (err && err.message ? err.message : JSON.stringify(err))); } catch(e) {}
            return false;
        }
    }

    // Teste removido em produção

    document.addEventListener('DOMContentLoaded', () => {
        // preços
        window.precosItens = {
            mussarela:25.00, calabresa:25.00, pepperoni:25.00, ragu_linguica:25.00, pannacotta:25.00,
            terrinha:25.00, ossobuco:25.00, sensacao:25.00,
            cuba:20.00, caipirinha:25.00, mojito:28.00, ginpesto:28.00, refrigerante:8.00, agua:5.00,
            chopp300:12.00, chopp500:18.00, chopp300promo:10.00, chopp500promo:16.00
        };

        // mostrar categorias e filtrar itens
        window.mostrarCategoria = function(categoria){
            document.getElementById('tela-categorias').style.display = 'none';
            document.getElementById('formulario-pedido').style.display = 'block';
            document.querySelectorAll('.item-pizza').forEach(el => el.style.display = categoria === 'pizzas' ? 'flex' : 'none');
            document.querySelectorAll('.item-bebida').forEach(el => el.style.display = categoria === 'bebidas' ? 'flex' : 'none');
        };
        window.voltarCategorias = function(){
            document.getElementById('tela-categorias').style.display = 'block';
            document.getElementById('formulario-pedido').style.display = 'none';
            // reset opcional: document.getElementById('formulario-pedido').reset();
        };

        // cálculo automático do valor total
        const inputValorTotal = document.getElementById('valorTotalCompra');
        function atualizarValorTotal(){
            const checkboxes = document.querySelectorAll('input[name="item_pedido"]');
            let total = 0;
            checkboxes.forEach(cb => {
                const key = cb.value;
                const qtdEl = document.getElementById('qtd_' + key);
                const qtd = qtdEl ? parseInt(qtdEl.value, 10) || 0 : 0;
                if (qtd > 0) cb.checked = true;
                if (!cb.checked) return;
                const preco = Number(window.precosItens[key] || 0);
                total += preco * qtd;
            });
            inputValorTotal.value = total.toFixed(2);
        }

        // ouvintes para checkboxes e quantidades
        document.querySelectorAll('input[name="item_pedido"]').forEach(cb => {
            cb.addEventListener('change', () => {
                const key = cb.value;
                const qtdEl = document.getElementById('qtd_' + key);
                if (cb.checked && qtdEl && (qtdEl.value === '' || Number(qtdEl.value) === 0)) qtdEl.value = 1;
                if (!cb.checked && qtdEl) qtdEl.value = 0;
                atualizarValorTotal();
            });
        });
        document.querySelectorAll('.qtd-input').forEach(q => {
            q.addEventListener('input', () => {
                const key = q.id.replace(/^qtd_/, '');
                const cb = document.querySelector('input[name="item_pedido"][value="'+key+'"]');
                const val = parseInt(q.value, 10) || 0;
                if (cb) cb.checked = val > 0;
                atualizarValorTotal();
            });
        });
        atualizarValorTotal();

        // Funções para painel de vendas
        window.abrirPainelVendas = function() {
            document.getElementById('painel-vendas').style.display = 'block';
            carregarVendas();
        };
        window.fecharPainelVendas = function() {
            document.getElementById('painel-vendas').style.display = 'none';
        };

        async function carregarVendas() {
            const listEl = document.getElementById('vendas-list');
            listEl.innerHTML = 'Carregando...';
            if (!window.firebaseDb) {
                listEl.innerHTML = '<div style="color:#f88">Firebase não disponível.</div>';
                return;
            }
            try {
                const snapshot = await window.firebaseDb.ref('vendas').orderByKey().limitToLast(200).once('value');
                const data = snapshot.val();
                if (!data) {
                    listEl.innerHTML = '<div>Nenhuma venda encontrada.</div>';
                    return;
                }
                // Ordena por timestamp key (chaves são unix timestamps)
                const entries = Object.entries(data).sort((a,b)=> Number(b[0]) - Number(a[0]));
                const html = entries.map(([key, v]) => {
                    const itens = Array.isArray(v.itens) ? v.itens.map(it=>`${it.nomeItem} (${it.qtd}x)`).join(', ') : (v.itens || '');
                    return `<div style="padding:8px 6px; border-bottom:1px solid rgba(255,255,255,0.04);">
                        <div style="font-weight:600;">${v.senha || ''} • R$ ${Number(v.valorTotal||0).toFixed(2)}</div>
                        <div style="font-size:12px; color:#cfe">${itens}</div>
                        <div style="font-size:11px; color:#9db">${v.timestamp || new Date(Number(key)).toLocaleString('pt-BR')}</div>
                    </div>`;
                }).join('');
                listEl.innerHTML = html;
            } catch (err) {
                console.error('Erro ao carregar vendas:', err);
                listEl.innerHTML = '<div style="color:#f88">Erro ao carregar vendas. Veja console.</div>';
            }
        }

        // submit -> gera PDF e salva no Firebase
        const form = document.getElementById('formulario-pedido');
        if (form) {
            form.addEventListener('submit', function(e){
                e.preventDefault();
                const jsPDFLib = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
                if (!jsPDFLib) { alert('Erro: jsPDF não carregado.'); return; }

                const senha = document.getElementById('senha_pedido')?.value || Date.now().toString();
                const total = document.getElementById('valorTotalCompra')?.value || '0.00';

                const itensSelecionados = Array.from(document.querySelectorAll('input[name="item_pedido"]'))
                    .map(cb => {
                        const key = cb.value;
                        const qtd = parseInt(document.getElementById('qtd_' + key)?.value || '0', 10) || 0;
                        const label = document.querySelector('label[for="'+cb.id+'"]');
                        const nomeItem = label ? label.textContent.split('-')[0].trim() : key;
                        const preco = window.precosItens[key] || 0;
                        return { key, nomeItem, qtd, preco };
                    })
                    .filter(it => it.qtd > 0);

                if (itensSelecionados.length === 0) {
                    alert('Nenhum item com quantidade selecionada.');
                    return;
                }

                // Prepara dados para salvar no Firebase
                const dataVenda = {
                    timestamp: new Date().toLocaleString('pt-BR'),
                    senha: senha,
                    valorTotal: parseFloat(total),
                    itens: itensSelecionados,
                    quantidadeItens: itensSelecionados.length,
                    dataUnix: Date.now()
                };

                // Salva no Firebase (não aguarda resposta)
                salvarVendaNoFirebase(dataVenda);

                try {
                    // Configura PDF no formato cupom (80mm x 150mm em pontos ~ 226.77 x 425.20)
                    const doc = new jsPDFLib({
                        unit: 'mm',
                        format: [80, 150],  // largura: 80mm (padrão cupom fiscal)
                        orientation: 'portrait'
                    });
                    
                    // Margens laterais
                    const marginLeft = 5;  // 5mm de margem
                    const pageWidth = doc.internal.pageSize.getWidth();
                    let pageIndex = 0;

                    itensSelecionados.forEach(it => {
                        for (let u = 1; u <= it.qtd; u++) {
                            if (pageIndex > 0) doc.addPage();
                            pageIndex++;

                            // Cabeçalho centralizado (marca)
                            doc.setFontSize(12);
                            const marca = 'RuaRoma Dia de Pista';
                            const marcaW = doc.getTextWidth(marca);
                            doc.text(marca, (pageWidth - marcaW) / 2, 10);

                            // "VALE" em destaque centralizado
                            doc.setFontSize(32);  // reduzido para caber na largura
                            try { doc.setFont(undefined, 'bold'); } catch(e){}
                            const valeText = 'VALE';
                            const valeW = doc.getTextWidth(valeText);
                            doc.text(valeText, (pageWidth - valeW) / 2, 30);

                            // Texto do vale - produto alinhado à esquerda
                            const textoVale = `Vale 1x ${it.nomeItem}`;
                            doc.setFontSize(16);
                            try { doc.setFont(undefined, 'bold'); } catch(e){}
                            doc.text(textoVale, marginLeft, 45);

                            // Informações extras alinhadas à esquerda
                            doc.setFontSize(8);
                            try { doc.setFont(undefined, 'normal'); } catch(e){}
                            doc.text(`Unidade: ${u} de ${it.qtd}`, marginLeft, 55);

                            doc.setFontSize(20);
                            try { doc.setFont(undefined, 'bold'); } catch(e){}
                            doc.text(`Senha: ${senha}`, marginLeft, 80);

                            doc.setFontSize(8);
                            try { doc.setFont(undefined, 'normal'); } catch(e){}
                            doc.text(`Emitido: ${new Date().toLocaleString('pt-BR')}`, marginLeft, 100);
                        }
                    });

                    const filename = `vales-${senha}.pdf`;
                    try {
                        const pdfBlob = doc.output('blob');
                        const blobUrl = URL.createObjectURL(pdfBlob);

                        const printWindow = window.open('', '_blank');
                        if (printWindow) {
                            printWindow.document.write(`
                                <html>
                                <head><title>Imprimir Vale</title></head>
                                <body style="margin:0">
                                    <embed width="100%" height="100%" src="${blobUrl}" type="application/pdf"></embed>
                                    <script>
                                        window.onload = function() {
                                            setTimeout(function() {
                                                window.focus();
                                                window.print();
                                            }, 200);
                                        };
                                        window.onafterprint = function() {
                                            setTimeout(function() { window.close(); }, 100);
                                        };
                                    <\/script>
                                </body>
                                </html>
                            `);
                            printWindow.document.close();
                            alert(`✓ Venda registrada!\n✓ Impressão enviada para a impressora.`);
                        } else {
                            doc.save(filename);
                            alert(`✓ Venda registrada!\n✓ PDF gerado: ${filename}`);
                        }
                    } catch (printErr) {
                        console.warn('Erro ao imprimir automaticamente:', printErr);
                        doc.save(filename);
                        alert(`✓ Venda registrada!\n✓ PDF gerado: ${filename}`);
                    }
                } catch (err) {
                    console.error('Erro ao gerar PDF:', err);
                    alert('⚠ Erro ao gerar PDF, mas venda foi salva no Firebase.');
                }
            });
        }
    });
    </script>
</body>
</html>
